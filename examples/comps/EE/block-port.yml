# This is the commonly used Block Port symbol in EE schematics.

# 电子电路电路图中常用的模块输入输出端口


type: component
# --- Input Vars ------
inputVars:
  labelText: PORT_NAME
  height: 18
  fillColor: yellow
  width: 150
  align: left
  lineWidth: 4
  
# --- Vars ------
vars:
  sw: $lineWidth
  tagW: $width
  tagH: $height
  openDeg: 46
  lenToCut: tagH/2 / dtan(openDeg/2)

# --- Points ------
points:
  p0: (0, 0)
  p1: p0.x, p0.y - tagH
  p2: p0.x, p0.y + tagH
  p3: p0.x + tagW - lenToCut, p2.y
  p4: p0.x + tagW, p0.y
  p5: p3.x, p1.y
  p6: p4.x + 4 * sw, p4.y
  pLabel: p0.x + (tagW - lenToCut) / 2, p0.y
 
# --- Shapes ------
shapes:
  tag: plg; p1; p2; p3; p4; p5;
  bar: line; p4; p6

# --- Draw --------
draw:
  - bar; fill,none; stroke, cc, sw; linecap; round;
  - tag; fill, $fillColor; stroke, cc, sw*0.75;
  - label; at; pLabel; anchor; center; w; tagW - lenToCut - 6  * 2 ; h; tagH; align; $align; bold; ||| $labelText

ports:
  - p; p6; 0; 0
