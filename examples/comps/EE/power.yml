# This is the commonly used Power symbol used in EE schematics

# 电子电路电路图中常用的电源符号，比如VCC

# --- Input Vars ------
inputVars:
  lineWidth: 4
  tagWidth: 40
  color: maroon  
  tag: VCC

# --- Vars ------
vars:
  sw: $lineWidth
  wBarH: $tagWidth
  hBarV: sw * 5

# --- Points ------
points:
  p0: (0, 0)

# --- Shapes ------
shapes:
  barH: line; p0.x - wBarH/2, p0.y - hBarV ; p0.x + wBarH/2, p0.y - hBarV;
  barV: line; p0; p0.x, p0.y - hBarV

# --- Draw --------
draw:
  - barH; stroke, sw, $color; linecap; round
  - barV; stroke, sw, $color; linecap; round
  - label; at;p0.x, p0.y - hBarV - 2; anchor; bm; w; wBarH * 0.96; h; 20;  ||| $tag

ports:
  - p; p0; 90; 0
