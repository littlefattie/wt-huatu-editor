# This is an example showing how to make intersections of three ellipse, and include the specified intersections into point series.

# 这是文档中的一个示例，展示如何获取三个椭圆各自的交点，并把同类型的交点进行组合成点序列.


vars:
  rx: 60
  ry: rx * 2.444

points:
  p0: 0,0

shapes:
  ell1: ell; p0; rx; ry; 0;
  ell2: ell; p0; rx; ry; 60;
  ell3: ell; p0; rx; ry; 120;

xpoints:
  xp12NE: ell1; ell2; ne;
  xp12E:  ell1; ell2; e;
  xp23E:  ell2; ell3; e;
  xp13SE: ell1; ell3; se;
  xp12SW: ell1; ell2; sw;
  xp23W:  ell2; ell3; w;
  xp13NW: ell1; ell3; nw;
  xp13NE: ell1; ell3; ne;
  xp12SE: ell1; ell2; se;
  xp23S:  ell2; ell3; s;
  xp13SW: ell1; ell3; sw;
  xp12NW: ell1; ell2; nw;
  xp23N:  ell2; ell3; n;

pointSeries:
  # Define Point Series by intersection points
  ps12: ell1; x; ell2;
  ps13: ell1; x; ell3;
  ps23: ell2; x; ell3;
  # Pick defined points to make Point Series
  psOuter: xp12NE; xp23E; xp13SE; xp12SW; xp23W; xp13NW;
  psInner: xp13NE; xp12SE; xp23S; xp13SW; xp12NW; xp23N;
blocks:
  ells:
    - ell1; stroke, 1, #000; 
    - ell2; stroke, 1, #666; 
    - ell3; stroke, 1, #aaa; 
  blk1:
    - ells; fill, none;
    - circ; xp12NE; 8; ||| fill, cyan;
    - circ; xp12E;  8; ||| fill, magenta;
    - ps12; 4; royalblue;
    - label; xp12NE; anchor; bl; w; 60; h; 40; ||| 方位 NE 
    - label; xp12E;  anchor; tl; w; 60; h; 30; ||| 方位 E 
  blk2:
    - ells; stroke, 1, cc; fill, none;
    - psOuter; 4; red;
    - psInner; 4; blue;
draw:
  - blk1;
  - blk2; move; ry * 2.2, 0;